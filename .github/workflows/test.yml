name: Test App & Library

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    paths:
      - "app/**"
      - ".github/**"
      - "nusamai/**"
      - "nusamai-*/**"
      - "demo/**"
      - "docs/**"
      - "*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Restore timestamps to cache workspace crates
        uses: chetan/git-restore-mtime-action@v2

      - name: Rustup
        run: rustup toolchain install stable --profile minimal
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-workspace-crates: true
      - name: Install dependencies
        # if: matrix.platform == 'ubuntu-20.04'
        run: |
          sudo apt-get update
          sudo apt install -y libwebkit2gtk-4.1-dev libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Make Tauri build destination
        run: mkdir -p app/build
      - name: Test
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info --all-features
        env:
          GPKG_TEST_OUTPUT_DIR: /tmp/gpkg_test
      - name: Check GeoPackage output has no WAL/SHM sidecars
        run: |
          if find /tmp/gpkg_test -maxdepth 1 \( -name '*-wal' -o -name '*-shm' \) -print -quit | grep -q .; then
            echo "::error::GeoPackage sidecar files (-wal/-shm) found. Ensure GpkgHandler::finalize() is called."
            exit 1
          fi
      - name: Validate GeoPackage with GDAL
        # Using Docker because GDAL 3.13 (where `gdal driver gpkg validate` was
        # added) is not officially released yet. Migrate to a direct install after
        # the official release.
        run: |
          for f in /tmp/gpkg_test/*.gpkg; do
            name=$(basename "$f")
            # init_connect.gpkg has no tables/features, so GDAL cannot open it
            if [ "$name" = "init_connect.gpkg" ]; then
              echo "=== $name (skipped) ==="
              continue
            fi
            echo "=== $name ==="
            docker run --rm -v "$f:/data/$name:ro" \
              ghcr.io/osgeo/gdal:alpine-normal-3.13.0beta1 \
              gdal driver gpkg validate "/data/$name"
          done
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: lcov.info
          fail_ci_if_error: false
